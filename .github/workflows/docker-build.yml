name: Docker Build

# Day 5-6 re-enable push trigger gdy agents są wired end-to-end.
# Day 1-4: manual via `gh workflow run "Docker Build"` if needed.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: [scout, judge, executor, treasurer]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.agent }}
        run: docker build -f agents/${{ matrix.agent }}/Dockerfile -t quorum-${{ matrix.agent }}:${{ github.sha }} .
