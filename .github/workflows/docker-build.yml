name: Docker Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: [scout, judge, executor, treasurer]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.agent }}
        run: docker build -f agents/${{ matrix.agent }}/Dockerfile -t quorum-${{ matrix.agent }}:${{ github.sha }} .
