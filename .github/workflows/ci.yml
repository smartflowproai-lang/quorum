name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install shared
        run: cd shared && npm install --no-package-lock
      - name: Install agents
        run: |
          for a in scout judge verifier executor treasurer; do
            cd agents/$a && npm install --no-package-lock && cd ../..
          done
      - name: Typecheck agents (allow fail in stub phase)
        run: |
          for a in scout judge verifier executor treasurer; do
            cd agents/$a && (npx tsc --noEmit || echo "typecheck warnings for $a (stub phase, OK)") && cd ../..
          done

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install shared
        run: cd shared && npm install --no-package-lock
      - name: Install agents
        run: |
          for a in scout judge verifier executor treasurer; do
            cd agents/$a && npm install --no-package-lock && cd ../..
          done
      - name: Run tests
        run: |
          for a in scout judge verifier executor treasurer; do
            cd agents/$a && npm test --if-present && cd ../..
          done
