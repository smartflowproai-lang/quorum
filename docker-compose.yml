# QUORUM — 5-agent mesh for ETHGlobal OpenAgents 2026
# Scout + Judge in Frankfurt, Verifier + Executor + Treasurer in NYC.
# This compose runs all five locally for demo; cross-host deploy splits services per geo via infra/deploy-vps.sh.

version: "3.9"

services:
  scout:
    build:
      context: .
      dockerfile: agents/scout/Dockerfile
    container_name: quorum-scout
    env_file: .env
    volumes:
      - axl-mesh:/var/run/axl
      - ./shared:/app/shared:ro
    networks: [quorum-mesh]
    restart: unless-stopped

  judge:
    build:
      context: .
      dockerfile: agents/judge/Dockerfile
    container_name: quorum-judge
    env_file: .env
    volumes:
      - axl-mesh:/var/run/axl
      - ./shared:/app/shared:ro
    networks: [quorum-mesh]
    restart: unless-stopped
    depends_on: [scout]

  verifier:
    build:
      context: .
      dockerfile: agents/verifier/Dockerfile
    container_name: quorum-verifier
    env_file: .env
    volumes:
      - axl-mesh:/var/run/axl
      - ./shared:/app/shared:ro
    networks: [quorum-mesh]
    restart: unless-stopped
    depends_on: [judge]

  executor:
    build:
      context: .
      dockerfile: agents/executor/Dockerfile
    container_name: quorum-executor
    env_file: .env
    volumes:
      - axl-mesh:/var/run/axl
      - ./shared:/app/shared:ro
    networks: [quorum-mesh]
    restart: unless-stopped
    depends_on: [verifier]

  treasurer:
    build:
      context: .
      dockerfile: agents/treasurer/Dockerfile
    container_name: quorum-treasurer
    env_file: .env
    volumes:
      - axl-mesh:/var/run/axl
      - ./shared:/app/shared:ro
    networks: [quorum-mesh]
    restart: unless-stopped

volumes:
  axl-mesh:

networks:
  quorum-mesh:
    driver: bridge
